<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #f8eeee;
            color: #5f3535;
            overflow-x: hidden;
        }

        section {
            min-height: 100vh;
            width: 100%;
            position: relative;
        }

        .hero {
            background:
                linear-gradient(rgba(255, 245, 245, 0.85), rgba(255, 235, 240, 0.95)),
                radial-gradient(circle at top, #ffe1ea, #f8eeee);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 25px;
        }

        .hero-card {
            max-width: 900px;
            width: 100%;
            padding: 45px 25px;
            border: 2px solid #d8a7b1;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 0 20px 60px rgba(150, 80, 90, 0.18);
        }

        .hero h1 {
            font-size: clamp(42px, 8vw, 95px);
            font-weight: 400;
            letter-spacing: 4px;
            color: #7b4545;
            margin-bottom: 25px;
        }

        .hero p {
            font-size: clamp(22px, 4vw, 38px);
            line-height: 1.5;
            color: #8a5a5a;
            margin-bottom: 35px;
        }

        .open-btn {
            border: none;
            padding: 17px 42px;
            border-radius: 50px;
            background: linear-gradient(135deg, #d8a7b1, #f3c6cf);
            color: #5b3030;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(120, 60, 70, 0.22);
        }

        .countdown-section {
            background: #f8eeee;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 35px 15px;
        }

        .count-title {
            font-size: clamp(36px, 7vw, 78px);
            font-weight: 400;
            letter-spacing: 4px;
            color: #774343;
            border: 2px solid #c89aa4;
            padding: 8px 45px;
            margin-bottom: 55px;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .time-box {
            min-width: 120px;
        }

        .time-box span {
            display: block;
            font-size: clamp(45px, 9vw, 90px);
            font-weight: bold;
            color: #d6bdae;
            -webkit-text-stroke: 2px #fff;
            text-shadow: 0 4px 12px rgba(100, 70, 70, 0.15);
        }

        .time-box p {
            font-family: Arial, sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
            color: #111;
            margin-top: 8px;
        }

        .video-section {
            background: #000;
            height: 100vh;
        }

        .video-section video {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            background: #000;
            display: block;
        }

        .details {
            background:
                linear-gradient(rgba(255, 240, 244, 0.96), rgba(255, 235, 240, 0.98)),
                radial-gradient(circle at bottom, #ffdce6, #f8eeee);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 18px;
        }

        .details-card {
            max-width: 850px;
            width: 100%;
            padding: 45px 25px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.55);
            border: 2px solid #d8a7b1;
            box-shadow: 0 20px 60px rgba(150, 80, 90, 0.18);
        }

        .details h2 {
            font-size: clamp(34px, 6vw, 70px);
            font-weight: 400;
            color: #774343;
            margin-bottom: 25px;
        }

        .details p {
            font-size: clamp(20px, 4vw, 34px);
            line-height: 1.6;
            color: #8a5a5a;
            margin-bottom: 18px;
        }

        .map-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 16px 34px;
            border-radius: 50px;
            background: linear-gradient(135deg, #d8a7b1, #f3c6cf);
            color: #5b3030;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 18px;
            font-weight: bold;
        }

        .hint {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.75);
            color: #7b4545;
            padding: 10px 18px;
            border-radius: 30px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 99;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 600px) {
            .hero-card,
            .details-card {
                padding: 35px 18px;
            }

            .count-title {
                padding: 8px 18px;
                letter-spacing: 2px;
            }

            .time-box {
                min-width: 90px;
            }

            .timer {
                gap: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="hint">Scroll Down ↓</div>

    <audio id="weddingAudio" loop>
        <source src="wedding-audio.mp3" type="audio/mpeg">
    </audio>

    <section class="hero">
        <div class="hero-card">
            <h1>YOU'RE INVITED</h1>
            <p>
                You're invited to our<br>
                most special day.
            </p>
            <button class="open-btn" onclick="startInvitation()">
                Open Invitation
            </button>
        </div>
    </section>

    <section class="countdown-section">
        <h1 class="count-title">UNTIL THE BIG DAY</h1>

        <div class="timer">
            <div class="time-box">
                <span id="days">00</span>
                <p>DAYS</p>
            </div>

            <div class="time-box">
                <span id="hours">00</span>
                <p>HOURS</p>
            </div>

            <div class="time-box">
                <span id="mins">00</span>
                <p>MINS</p>
            </div>

            <div class="time-box">
                <span id="secs">00</span>
                <p>SECS</p>
            </div>
        </div>
    </section>

    <section class="video-section">
        <video src="video1.mp4" controls playsinline></video>
    </section>

    <section class="video-section">
        <video src="video2.mp4" controls playsinline></video>
    </section>

    <section class="video-section">
        <video src="video3.mp4" controls playsinline></video>
    </section>

    <section class="details">
        <div class="details-card">
            <h2>THE WEDDING DAY</h2>

            <p>Sunday, 12 July 2026</p>
            <p>6:30 PM</p>

            <p>
                The Great St. Antony<br>
                Zahraa El Maadi
            </p>

            <a class="map-btn" href="https://maps.app.goo.gl/Mvet1vb7Bpa6RTQs5" target="_blank">
                Click here to Get Direction
            </a>
        </div>
    </section>

    <script>
        const weddingDate = new Date("2026-07-12T18:30:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = weddingDate - now;

            if (diff <= 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("mins").innerText = "00";
                document.getElementById("secs").innerText = "00";
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById("days").innerText = String(days).padStart(2, "0");
            document.getElementById("hours").innerText = String(hours).padStart(2, "0");
            document.getElementById("mins").innerText = String(mins).padStart(2, "0");
            document.getElementById("secs").innerText = String(secs).padStart(2, "0");
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        function startInvitation() {
            const audio = document.getElementById("weddingAudio");
            audio.play();

            document.querySelector(".countdown-section").scrollIntoView({
                behavior: "smooth"
            });
        }

        const videos = document.querySelectorAll("video");

        videos.forEach((video, index) => {
            video.addEventListener("play", () => {
                videos.forEach((otherVideo) => {
                    if (otherVideo !== video) {
                        otherVideo.pause();
                    }
                });
            });

            video.addEventListener("ended", () => {
                if (videos[index + 1]) {
                    videos[index + 1].scrollIntoView({
                        behavior: "smooth"
                    });

                    setTimeout(() => {
                        videos[index + 1].play();
                    }, 900);
                } else {
                    document.querySelector(".details").scrollIntoView({
                        behavior: "smooth"
                    });
                }
            });
        });
    </script>

</body>
</html>
